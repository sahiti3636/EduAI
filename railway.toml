[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injects $PORT — uvicorn must bind to it, not a hardcoded port.
# startCommand intentionally omitted — CMD in Dockerfile handles this.
# Shell-form CMD expands $PORT correctly; Railway's exec-form startCommand does not.
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
