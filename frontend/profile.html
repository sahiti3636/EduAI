<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>(function(){try{var t=localStorage.getItem('mindforge_theme');if(!t)t=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MindForge — Concept Map</title>
<link rel="stylesheet" href="css/style.css?v=2" />
<link rel="stylesheet" href="css/premium.css?v=2" />
<link rel="stylesheet" href="css/theme.css?v=1" />
</head>
<body>

<div class="mesh-bg" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
</div>

<div class="page-wrap">

  <header class="site-header">
    <a href="index.html" class="logo">
      <img src="assets/logo.png" class="logo-img" alt="MindForge" style="height: 32px; width: auto; border-radius: 8px; margin-right: 6px;" />
      <span class="logo-wordmark">MindForge</span>
    </a>
    <div class="header-right">
      <span id="header-label" class="badge-pill" style="font-size:.7rem;"></span>
    </div>
  </header>

  <main style="max-width:860px;margin:0 auto;padding:0 20px 40px;">

    <div class="chat-topbar" style="margin-bottom:24px;">
      <a href="index.html" class="back-link" style="margin-bottom:0;">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M10 3L5 8l5 5"/>
        </svg>
        Home
      </a>
      <span class="chat-topbar-title">Concept Map</span>
    </div>

    <p style="color:var(--text-mid);font-size:.85rem;margin-bottom:24px;line-height:1.55;">
      Your understanding of each concept, based on your tutoring sessions.
      Concepts build on each other — arrows show which concepts depend on which.
    </p>

    <!-- Legend -->
    <div class="concept-legend">
      <span class="legend-item"><span class="legend-dot solid"></span>Solid</span>
      <span class="legend-item"><span class="legend-dot shaky"></span>Needs work</span>
      <span class="legend-item"><span class="legend-dot not_tested"></span>Not yet explored</span>
    </div>

    <div id="concept-map-container">
      <div class="concept-loading" id="concept-loading">Loading your concept map…</div>
    </div>

  </main>
</div>

<script src="js/env.js?v=1"></script>
<script src="js/bundle.js?v=10"></script>
<script src="js/profile.js"></script>
<script src="js/premium.js?v=2"></script>
<script src="js/shell.js?v=1"></script>
</body>
</html>
