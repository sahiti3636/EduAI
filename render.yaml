# Render Blueprint for the EduAI backend (FastAPI, Docker).
# Create the service from this file: Render Dashboard → New → Blueprint → pick this repo.
# You will be prompted to fill the `sync: false` secrets after it detects the blueprint.
services:
  - type: web
    name: eduai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # PERSISTENT storage via a hosted Postgres (Neon/Supabase/Render Postgres).
      # When DATABASE_URL is set, the app uses Postgres and data survives restarts,
      # deploys and free-tier spin-downs. Paste your Neon connection string here in
      # the Render dashboard (include ?sslmode=require).
      - key: DATABASE_URL
        sync: false
      # Secrets — set these in the Render dashboard (not committed to git):
      - key: GEMINI_API_KEY
        sync: false
      - key: TEACHER_USERNAME
        sync: false
      - key: TEACHER_PASSWORD
        sync: false
      # Fallback SQLite path (only used if DATABASE_URL is NOT set — ephemeral on free tier).
      - key: DB_PATH
        value: /app/backend/data/eduai.db
